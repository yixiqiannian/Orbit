version: "3.8"

services:
  backend:
    build: ./backend
    container_name: orbit-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - orbit-network

  frontend:
    build: ./frontend
    container_name: orbit-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - orbit-network

  db:
    image: mysql:8.0
    container_name: orbit-db
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    volumes:
      - mysql-data:/var/lib/mysql
    restart: unless-stopped
    networks:
      - orbit-network

volumes:
  mysql-data:

networks:
  orbit-network:
    driver: bridge
